name: Keep Render Alive
on:
  schedule:
    - cron: '*/12 * * * *' # Every 12 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Services
        run: |
          curl -I https://asl-backend-gateway.onrender.com/
          curl -I https://asl-ml-service.onrender.com/health
