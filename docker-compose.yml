version: '3.8'

services:
  # 1. Local Postgres (Simulates Supabase)
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aslexperiment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aslexperiment"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Python ML Microservice (The "Brain")
  ml:
    build: 
      context: ./ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    # IMPORTANT: To test if your COPY commands worked for Render, 
    # comment out these volumes. If it still works without them, 
    # your production build is safe.
    # volumes:
    #   - ./ml/data:/app/data

  # 3. Rust Gateway Backend (The "Bridge")
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://user:password@db:5432/aslexperiment
      - ML_SERVICE_URL=http://ml:8000/predict
      - CLERK_JWKS_URL=https://api.clerk.com/v1/jwks
      - RUST_LOG=debug
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started

  # 4. React Frontend
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      # Use your Clerk keys here for local testing
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend

volumes:
  pgdata:
