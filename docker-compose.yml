services:
  # 1. Local Postgres (Simulates Supabase)
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aslexperiment
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aslexperiment"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Python ML Microservice (The "Brain")
  ml:
    build: 
      context: ./ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - R2_ENDPOINT_URL=https://ee0fdcdf275de9277d131051fed22fb0.r2.cloudflarestorage.com
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=asl-landmarks

  # 3. Rust Gateway Backend (The "Bridge")
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://user:password@db:5432/aslexperiment
      - ML_SERVICE_URL=http://ml:8000/predict
      - CLERK_JWKS_URL=${CLERK_JWKS_URL}
      - POSTHOG_API_KEY=phc_sc2eH8kg9c9xC6Rg38tDbEkingSEKDerVJsGukPNKZiZ
      - RUST_LOG=debug
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started

  # 4. React Frontend
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - VITE_POSTHOG_KEY=phc_sc2eH8kg9c9xC6Rg38tDbEkingSEKDerVJsGukPNKZiZ
      - VITE_POSTHOG_HOST=https://us.i.posthog.com
    depends_on:
      - backend

volumes:
  pgdata:
