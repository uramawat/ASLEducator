services:
  # 1. Python ML Microservice
  - type: web
    name: asl-ml-service
    env: docker
    rootDir: ml
    plan: free
    envVars:
      - key: PORT
        value: 8000
    ...
    # 2. Rust Backend Gateway
    - type: web
    name: asl-backend-gateway
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: 3000

      - key: DATABASE_URL
        sync: false # You will paste your Supabase URL in the Render UI
      - key: ML_SERVICE_URL
        value: http://asl-ml-service:8000/predict # Internal networking
      - key: CLERK_JWKS_URL
        sync: false # You will paste your Clerk JWKS URL in the Render UI
      - key: RUST_LOG
        value: info